# TNBC Atlas — Tier-1 Foundational Papers
#
# Hand-curated seed list of field-defining TNBC papers.
# Used as: (a) ground-truth recall benchmark for any harvest run,
#          (b) seed for tier=1 assignment in the bibliography,
#          (c) starting reading list for Phase 2 synthesis writers.
#
# Confidence levels:
#   high   = appears on multiple published bibliometric top-100 lists, or is a
#            named pivotal trial / subtype-defining paper widely cited
#   medium = important within sub-area; a domain expert would defend inclusion
#            but reasonable people might tier differently
#   low    = editorial seed; needs review by the editorial board before promotion
#
# Sources:
#   bib2022   = Clin Exp Med 2022 "top 100 most cited TNBC articles"
#   adc2024   = Discover Oncology 2024 ADC-in-TNBC bibliometric
#   io2024    = Frontiers in Oncology 2024 immunotherapy-in-TNBC bibliometric
#   neoadj24  = Frontiers 2024 neoadjuvant-TNBC bibliometric
#   editorial = my reading; needs editorial board confirmation
#
# Domain codes follow Phase 2 plan §2:
#   A = epidemiology and disparities
#   B = biology and molecular subtypes
#   C = diagnosis and pathology
#   D = treatment — early-stage
#   E = treatment — metastatic
#   F = immunotherapy
#   G = computational / ML / AI
#   H = clinical trial methodology
#   I = survivorship and supportive care
#   J = patient experience and ethics
#
# Schema version: 1
# Last updated: 2026-05-15
# Maintainer: Editorial PI (TBD)

version: 1
total_entries: 78


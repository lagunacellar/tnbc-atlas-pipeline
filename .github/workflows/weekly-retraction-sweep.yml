name: Weekly retraction sweep

on:
  schedule:
    - cron: '0 12 * * 2'     # Tuesdays 12:00 UTC
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # GITHUB_TOKEN defaults to read-only on this repo, so the issue step below
    # failed with 403 (it needs issues:write). Grant least-privilege scopes.
    permissions:
      contents: read
      issues: write
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Cross-reference against Retraction Watch
        run: python scripts/retraction_sweep.py

      - name: Archive retraction report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retracted-records-${{ github.run_id }}
          path: reports/retracted.csv
          retention-days: 365

      # ──────────────────────────────────────────────────────────────
      # If any records changed retraction_status this run, post a
      # summary issue so the editorial team sees it on the repo's
      # Issues tab without needing to read run logs.
      # ──────────────────────────────────────────────────────────────
      - name: Open issue if any records are retracted
        if: success()
        run: |
          # Count retracted rows in the report (skip header).
          COUNT=$(awk -F',' 'NR>1 && $2=="retracted"' reports/retracted.csv | wc -l | tr -d ' ')
          if [ "${COUNT:-0}" -gt 0 ]; then
            echo "Retracted records in report: $COUNT"
            # Ensure the label exists (idempotent); a missing label previously
            # made `gh issue create --label` fail and reddened the whole job.
            gh label create "retraction-review" \
              --color B60205 \
              --description "Records flagged by the weekly retraction sweep" \
              --force || true
            gh issue create \
              --title "Retraction sweep: $COUNT records flagged on $(date -u +%Y-%m-%d)" \
              --body "The weekly retraction sweep flagged $COUNT records as retracted. Download the workflow artifact for the full list and check whether any cited synthesis pages need revision." \
              --label "retraction-review"
          else
            echo "No retracted records in report; no issue opened."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

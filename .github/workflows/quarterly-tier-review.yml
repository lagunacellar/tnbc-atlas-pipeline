name: Quarterly tier review

on:
  schedule:
    - cron: '0 8 15 1,4,7,10 *'   # 15th of Jan/Apr/Jul/Oct at 08:00 UTC
  workflow_dispatch:

jobs:
  tier-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The issue step needs issues:write (GITHUB_TOKEN defaults to read-only).
    permissions:
      contents: read
      issues: write
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      # tier1_benchmark.py and nominate_tier2.py read exports/bibliography.jsonl,
      # which is gitignored and only produced by the export step. Generate it
      # from the DB first (DATABASE_URL is set above), like the weekly harvest.
      - name: Generate corpus export (exports/bibliography.jsonl)
        run: python scripts/export_and_report.py

      - name: Run tier-1 recall benchmark
        run: python scripts/tier1_benchmark.py

      - name: Generate tier-2 algorithmic nomination
        run: python scripts/nominate_tier2.py

      - name: Upload review packet
        uses: actions/upload-artifact@v4
        with:
          name: tier-review-${{ github.run_id }}
          path: |
            reports/tier1_coverage.md
            reports/tier1_matches.csv
            reports/tier2_nomination.md
            reports/tier2_candidates.csv
          retention-days: 365

      - name: Open editorial-review issue
        run: |
          # Ensure the label exists (idempotent) so issue creation can't fail on it.
          gh label create "editorial-review" \
            --color 5319E7 \
            --description "Quarterly tier-review packets for the editorial board" \
            --force || true
          gh issue create \
            --title "Quarterly tier review — $(date -u +%Y-Q$(( ( $(date +%-m) - 1 ) / 3 + 1 )))" \
            --label "editorial-review" \
            --body "$(cat <<EOF
          Quarterly tier review packet attached to workflow run ${{ github.run_id }}.

          **Tier-1 recall benchmark:** see workflow artifact \`tier1_coverage.md\`. Investigate any in-window misses.

          **Tier-2 candidates:** \`tier2_candidates.csv\` ranked by score. Editorial board reviews the score≥7 entries first; everything else is lower priority.

          Outcome:
          - [ ] In-window tier-1 recall ≥ 95% (or root cause documented)
          - [ ] Editorial board reviewed top-tier candidates and recorded decisions in \`curation/tier2_approved.yml\`
          - [ ] Approved promotions applied to the production DB
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
